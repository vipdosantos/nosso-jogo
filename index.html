<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Jornada do Nosso Amor ❤️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #ffebee; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .game-container { background: white; width: 100%; max-width: 600px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; position: relative; border: 4px solid #ff4081; }
        
        .header { background: #ff4081; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .hearts-counter { font-size: 1.2rem; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; }
        
        .content { padding: 25px; text-align: center; }
        .scene-title { color: #d81b60; margin-bottom: 15px; font-size: 1.5rem; }
        .story-text { font-size: 1.1rem; line-height: 1.6; margin-bottom: 25px; color: #555; }
        
        .options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { background: #fff0f5; border: 2px solid #ff80ab; padding: 12px 20px; border-radius: 12px; font-size: 1rem; color: #c2185b; cursor: pointer; transition: all 0.2s ease; font-weight: 600; }
        .option-btn:hover { background: #ff4081; color: white; transform: translateY(-2px); }
        
        /* Galeria Final de Fotos */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .photo-card { background: white; padding: 8px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transform: rotate(-2deg); }
        .photo-card:nth-child(even) { transform: rotate(2deg); }
        .photo-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 6px; }
        .photo-card p { font-size: 0.8rem; color: #666; margin-top: 5px; font-style: italic; }
        
        .restart-btn { margin-top: 25px; background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <span>❤️ Nossa História</span>
        <div class="hearts-counter">Corações: <span id="hearts-count">0</span> / 100</div>
    </div>

    <div class="content" id="game-content">
        <!-- O conteúdo será alterado dinamicamente via JavaScript -->
    </div>
</div>

<script>
    // 1. DADOS DAS FASES DO JOGO
    // Você pode editar as perguntas, as opções e a quantidade de corações ganha em cada resposta!
    const scenes = [
        {
            title: "Capítulo 1: Oi, Como foi seu Dia?",
            text: "Lembra de quando nos vimos pela primeira vez? Eu estava super nervoso tentando pensar no que dizer...",
            options: [
                { text: "Dizer um 'Oi' envergonhado e dar um sorriso", hearts: 35 },
                { text: "E você quebrou aquele gelo, me falando você prometeu uma coisa.", hearts: 25 },
                { text: "Eu todo timido, Vendo a Valeria no carro, eu fiz o que prometi.", hearts: 15 }
            ]
        },
        {
            title: "Capítulo 2: O Momento Marcante",
            text: "Conforme o tempo foi passando, fomos criando memórias incríveis juntos. Qual é o ingrediente principal do nosso amor?",
            options: [
                { text: "Nossos risos e brincadeiras diárias", hearts: 35 },
                { text: "O carinho e a parceria em todos os momentos", hearts: 35 },
                { text: "Tudo isso junto e mais um pouco!", hearts: 40 }
            ]
        },
        {
            title: "Capítulo 3: O Pedido de Amor",
            text: "Hoje, depois de tudo o que vivemos, eu tenho apenas uma certeza absoluta...",
            options: [
                { text: "Que eu quero continuar conquistando você todos os dias! ❤️", hearts: 30 },
                { text: "Que você é a pessoa mais especial da minha vida! 💕", hearts: 30 }
            ]
        }
    ];

    // 2. FOTOS DO FINAL DO JOGO
    // Substitua os links abaixo pelas fotos de vocês (podem ser links da web ou arquivos locais como "foto1.jpg")
    const photos = [
        { url: "https://via.placeholder.com/300x300/ff80ab/ffffff?text=Nossa+Foto+1", caption: "O começo de tudo!" },
        { url: "https://via.placeholder.com/300x300/ff4081/ffffff?text=Nossa+Foto+2", caption: "Aquela viagem inesquecível" },
        { url: "https://via.placeholder.com/300x300/c2185b/ffffff?text=Nossa+Foto+3", caption: "Um dos meus momentos favoritos" },
        { url: "https://via.placeholder.com/300x300/e91e63/ffffff?text=Nossa+Foto+4", caption: "Para sempre com você ❤️" }
    ];

    // ESTADO DO JOGO
    let currentScene = 0;
    let totalHearts = 0;

    // INICIALIZAR O JOGO
    function loadScene() {
        const contentDiv = document.getElementById("game-content");
        const scene = scenes[currentScene];

        let optionsHTML = "";
        scene.options.forEach((opt, index) => {
            optionsHTML += `<button class="option-btn" onclick="selectOption(${opt.hearts})">${opt.text}</button>`;
        });

        contentDiv.innerHTML = `
            <h2 class="scene-title">${scene.title}</h2>
            <p class="story-text">${scene.text}</p>
            <div class="options-container">
                ${optionsHTML}
            </div>
        `;
    }

    // PROCESSAR A ESCOLHA DO JOGADOR
    function selectOption(heartsGained) {
        totalHearts += heartsGained;
        document.getElementById("hearts-count").innerText = totalHearts;

        currentScene++;

        if (currentScene < scenes.length) {
            loadScene();
        } else {
            showFinalScreen();
        }
    }

    // TELA FINAL COM AS FOTOS
    function showFinalScreen() {
        const contentDiv = document.getElementById("game-content");

        let photosHTML = "";
        photos.forEach(photo => {
            photosHTML += `
                <div class="photo-card">
                    <img src="${photo.url}" alt="Nossa Foto">
                    <p>${photo.caption}</p>
                </div>
            `;
        });

        contentDiv.innerHTML = `
            <h2 class="scene-title">🎉 Parabéns, Meu Amor! 🎉</h2>
            <p class="story-text">Você coletou <b>${totalHearts} Corações</b> e desbloqueou nosso álbum especial de memórias!</p>
            
            <div class="gallery-grid">
                ${photosHTML}
            </div>

            <p style="margin-top: 25px; font-weight: bold; color: #d81b60;">Eu te amo muito!</p>
            <button class="restart-btn" onclick="restartGame()">Jogar Novamente 🔄</button>
        `;
    }

    // REINICIAR JOGO
    function restartGame() {
        currentScene = 0;
        totalHearts = 0;
        document.getElementById("hearts-count").innerText = totalHearts;
        loadScene();
    }

    // Iniciar na primeira fase
    loadScene();
</script>

</body>
</html>
